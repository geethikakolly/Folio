# Local development profile
# Activate with: SPRING_PROFILES_ACTIVE=local mvn spring-boot:run
# Or: mvn spring-boot:run -Dspring-boot.run.profiles=local
# Assumes PostgreSQL and Redis are running locally (e.g. via `docker-compose up -d postgres redis`)

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/folio_db
    username: folio
    password: folio_password

  redis:
    host: localhost
    port: 6379

  otel:
    exporter:
      otlp:
        endpoint: http://localhost:4318

server:
  port: 8080
